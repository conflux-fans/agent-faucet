name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - run: bun install --frozen-lockfile
      - run: forge build
      - run: bun run abi:check
      - run: bun test
      - run: forge test
      - run: bun run build:frontend
